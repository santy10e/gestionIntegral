<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- WRAPPER -->
    <section class="hero-wrapper">

        <!-- NAVBAR -->
        <header class="nav-header">
            <nav class="nav-container">

                <a href="#" class="nav-logo">
                    <img src="img/logo_sin_fondo_v3.png" class="logo-img">
                </a>

                <ul class="nav-links">
                    <li><a href="#" class="nav-link">Nosotros</a></li>
                    <li><a href="#" class="nav-link">Servicios</a></li>
                    <li><a href="#" class="nav-link">Clientes</a></li>
                    <li><a href="#" class="nav-cta">Empezar</a></li>
                </ul>

            </nav>
        </header>

        <!-- HERO -->
        <section class="hero">

            <div class="hero-content">

                <div class="hero-grid">

                    <!-- LEFT -->
                    <div class="hero-left">

                        <span class="hero-badge">Consultoría Empresarial</span>

                        <h1 class="hero-title">
                            Impulsa tu empresa con
                            <span class="dynamic-text" id="dynamicText">estrategias</span>
                        </h1>

                        <p class="hero-desc">
                            Más de <strong>14 años en capacitación y consultoría empresarial</strong>.
                            Elevamos tu negocio con estándares de alto nivel.
                        </p>

                        <div class="hero-actions">
                            <a href="#" class="btn-primary">Empezar ahora</a>
                            <a href="#" class="btn-ghost">Ver servicios</a>
                        </div>

                    </div>

                    <!-- RIGHT -->
                    <div class="hero-right">
                        <div class="hero-card">
                            <img src="img/hero_foto.png" alt="Consultoría">
                        </div>
                    </div>

                </div>

            </div>

        </section>

    </section>

    <script src="script.js"></script>
</body>

</html>
